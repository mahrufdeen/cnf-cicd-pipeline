apiVersion: apps/v1
kind: Deployment
metadata:
  name: cnf-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cnf-app
  template:
    metadata:
      labels:
        app: cnf-app
    spec:
      containers:
      - name: cnf-app
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        ports:
        - containerPort: 8080
