name: CNF CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t cnf-app ./app

    - name: Set up Kind
      uses: helm/kind-action@v1

    - name: Load image
      run: kind load docker-image cnf-app

    - name: Deploy Helm
      run: helm install cnf-app ./helm/cnf-app

    - name: Verify
      run: kubectl get pods
